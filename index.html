<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet">


<style>
  :root {
    --ink:    #0a0805;
    --paper:  #f5f0e8;
    --gold:   #c9a84c;
    --gold2:  #e8d5a3;
    --dim:    #7a6e5e;
    --deep:   #1a1510;
    --cream:  #ede8da;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--deep);
    color: var(--paper);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Texture overlay ── */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 100%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  /* ── Header ── */
  header {
    position: relative; z-index:1;
    text-align: center;
    padding: 4rem 2rem 2rem;
  }

  .ornament {
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 0.5em;
    opacity: 0.6;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'IM Fell English', serif;
    font-weight: 400;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.05em;
    color: var(--paper);
    line-height: 1;
    margin: 0.5rem 0 0.25rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.1rem;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  /* ── Gold rule ── */
  .rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 500px;
    margin: 2rem auto;
  }
  .rule::before, .rule::after {
    content:'';
    flex:1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }
  .rule-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  /* ── Main stage ── */
  main {
    position: relative; z-index:1;
    max-width: 800px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  /* ── Prompt area ── */
  .prompt-section {
    margin-bottom: 2.5rem;
  }

  .prompt-label {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    display: block;
    margin-bottom: 1rem;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    color: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-style: italic;
    font-weight: 300;
    line-height: 1.6;
    padding: 1.25rem 1.5rem;
    resize: none;
    transition: border-color 0.3s, background 0.3s;
    outline: none;
    min-height: 90px;
  }
  textarea::placeholder {
    color: rgba(245,240,232,0.25);
    font-style: italic;
  }
  textarea:focus {
    border-color: rgba(201,168,76,0.5);
    background: rgba(255,255,255,0.05);
  }

  /* ── Compose button ── */
  .btn-compose {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 1rem 2rem;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold2);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-compose::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-compose:hover { border-color: rgba(201,168,76,0.7); color: var(--gold); }
  .btn-compose:hover::before { transform: translateX(100%); }
  .btn-compose:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-compose:disabled::before { display:none; }

  /* ── Loading state ── */
  .loading {
    text-align: center;
    padding: 3rem 0;
    display: none;
  }
  .loading.active { display: block; }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.1rem;
    color: var(--dim);
    margin-bottom: 1.5rem;
  }

  .loading-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    align-items: center;
  }
  .loading-steps li {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--dim);
    opacity: 0.4;
    transition: all 0.5s;
  }
  .loading-steps li.active { color: var(--gold); opacity: 0.8; }
  .loading-steps li.done { color: var(--paper); opacity: 0.5; }

  /* ── Result area ── */
  .result {
    display: none;
    animation: fadeIn 1s ease;
  }
  .result.active { display: block; }

  @keyframes fadeIn {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Programme note ── */
  .programme-note {
    background: rgba(201,168,76,0.04);
    border-left: 2px solid rgba(201,168,76,0.3);
    padding: 1.25rem 1.75rem;
    margin-bottom: 2rem;
    font-style: italic;
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--cream);
    font-weight: 300;
  }

  /* ── Metadata ── */
  .meta {
    display: flex;
    gap: 2rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .meta-label {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
  }
  .meta-value {
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--paper);
  }

  /* ── Audio player ── */
  .player-section {
    margin-bottom: 2.5rem;
  }

  .player-wrapper {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .play-btn {
    width: 48px; height: 48px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 1rem;
  }
  .play-btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

  .progress-track {
    flex:1;
    height: 1px;
    background: rgba(255,255,255,0.1);
    position: relative;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }
  .progress-fill::after {
    content:'';
    position:absolute; right:-3px; top:-3px;
    width:7px; height:7px;
    background: var(--gold2);
    border-radius: 50%;
  }

  .time-display {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    min-width: 60px;
    text-align: right;
  }

  /* ── Again button ── */
  .btn-again {
    display: inline-block;
    margin-top: 2rem;
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid rgba(245,240,232,0.15);
    color: var(--dim);
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 100;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-again:hover { border-color: rgba(201,168,76,0.3); color: var(--paper); }

  /* ── Error ── */
  .error-box {
    display: none;
    padding: 1rem 1.5rem;
    border: 1px solid rgba(200,80,80,0.3);
    background: rgba(200,80,80,0.04);
    color: rgba(245,200,200,0.8);
    font-style: italic;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
  }
  .error-box.active { display: block; }

  /* ── Candle flicker animation for loading ── */
  @keyframes flicker {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .candle { animation: flicker 2s ease-in-out infinite; }

</style>
</head>

<body>

<header>
  <div class="ornament">Est. MMXXVI &nbsp;·&nbsp; Classical AI Composition</div>
  <h1>The Composer</h1>
  <div class="subtitle">Speak your mood. Hear it become music.</div>
  <div class="rule"><div class="rule-diamond"></div></div>
</header>

<main>

  <div class="prompt-section">
    <label class="prompt-label" for="prompt">Describe a feeling, a moment, or a wish</label>
    <textarea
      id="prompt"
      rows="3"
      placeholder="Something melancholy for a rainy evening... a triumphant march at sunrise... tender, like remembering a friend..."
    ></textarea>
    <button class="btn-compose" id="composeBtn" onclick="compose()">
      Compose &nbsp;&nbsp;—&nbsp;&nbsp; Instruct the Master
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="loading-text candle">Confucius considers your words&hellip;</div>
    <ul class="loading-steps" id="loadingSteps">
      <li id="step1">Interpreting the mood</li>
      <li id="step2">Selecting composer and key</li>
      <li id="step3">Composing the piece</li>
      <li id="step4">Reviewing against composer style</li>
      <li id="step5">Rendering with FluidSynth</li>
    </ul>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">

    <div class="programme-note" id="programmeNote"></div>

    <div class="meta" id="meta"></div>

    <div class="rule"><div class="rule-diamond"></div></div>

    <div class="player-section">
      <div class="section-title">Performance</div>
      <div class="player-wrapper">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="progress-track" id="progressTrack" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-display" id="timeDisplay">0:00</div>
      </div>
    </div>

    <button class="btn-again" onclick="downloadMp3()">↓ Download MP3</button>
    <button class="btn-again" onclick="reset()">← Compose another</button>

  </div>

</main>

<audio id="audioEl" style="display:none"></audio>

<script>
let currentAudio = null;
let currentMp3   = null;   // base64 of last generated MP3
let currentMeta  = {};     // composer + mood for filename

let stepInterval = null;
let currentStep = 0;

const steps = ['step1','step2','step3','step4','step5'];
const stepMessages = [
  'Confucius considers your words…',
  'Selecting composer and key…',
  'Composing the piece…',
  'Reviewing against composer style…',
  'Rendering with FluidSynth…'
];

function startLoadingSteps() {
  currentStep = 0;
  steps.forEach(s => {
    document.getElementById(s).className = '';
  });
  document.querySelector('.loading-text').textContent = stepMessages[0];
  document.getElementById('step1').className = 'active';

  stepInterval = setInterval(() => {
    if (currentStep < steps.length - 1) {
      document.getElementById(steps[currentStep]).className = 'done';
      currentStep++;
      document.getElementById(steps[currentStep]).className = 'active';
      document.querySelector('.loading-text').textContent = stepMessages[currentStep];
    }
  }, 3500);
}

function stopLoadingSteps() {
  if (stepInterval) clearInterval(stepInterval);
  // Complete all
  steps.forEach(s => document.getElementById(s).className = 'done');
}

async function compose() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  // Reset UI
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('result').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  document.getElementById('composeBtn').disabled = true;

  startLoadingSteps();

  try {
    const res = await fetch('/compose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    stopLoadingSteps();
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || 'Composition failed');
    }

    document.getElementById('loading').classList.remove('active');
    renderResult(data);

  } catch (e) {
    stopLoadingSteps();
    document.getElementById('loading').classList.remove('active');
    document.getElementById('errorBox').textContent = e.message;
    document.getElementById('errorBox').classList.add('active');
    document.getElementById('composeBtn').disabled = false;
  }
}

function renderResult(data) {
  // Programme note
  document.getElementById('programmeNote').textContent = data.programme_note;

  // Meta
  const keyLabel = data.key;
  document.getElementById('meta').innerHTML = `
    <div class="meta-item">
      <span class="meta-label">Composer</span>
      <span class="meta-value">${data.composer}</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Key</span>
      <span class="meta-value">${keyLabel}</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Tempo</span>
      <span class="meta-value">♩ = ${data.tempo}</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Mood</span>
      <span class="meta-value">${data.mood}</span>
    </div>
  `;

  // Audio
  const audio = document.getElementById('audioEl');
  currentMp3  = data.mp3;
  currentMeta = { composer: data.composer, mood: data.mood };
  audio.src = 'data:audio/mp3;base64,' + data.mp3;
  audio.load();

  audio.addEventListener('timeupdate', updateProgress);
  audio.addEventListener('ended', () => {
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('timeDisplay').textContent = '0:00';
  });

  // Show result
  document.getElementById('result').classList.add('active');
  document.getElementById('composeBtn').disabled = false;
}

function downloadMp3() {
  if (!currentMp3) return;
  const composer = (currentMeta.composer || 'composer').toLowerCase();
  const mood     = (currentMeta.mood     || 'piece').toLowerCase();
  const filename = `the-composer_${composer}_${mood}.mp3`;
  const a        = document.createElement('a');
  a.href         = 'data:audio/mp3;base64,' + currentMp3;
  a.download     = filename;
  a.click();
}

function togglePlay() {
  const audio = document.getElementById('audioEl');
  const btn = document.getElementById('playBtn');
  if (audio.paused) {
    audio.play();
    btn.textContent = '⏸';
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}

function updateProgress() {
  const audio = document.getElementById('audioEl');
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const m = Math.floor(audio.currentTime / 60);
  const s = Math.floor(audio.currentTime % 60).toString().padStart(2,'0');
  document.getElementById('timeDisplay').textContent = `${m}:${s}`;
}

function seek(e) {
  const audio = document.getElementById('audioEl');
  if (!audio.duration) return;
  const rect = document.getElementById('progressTrack').getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function reset() {
  document.getElementById('result').classList.remove('active');
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('audioEl').pause();
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('prompt').focus();
}

// Enter to submit
document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); compose(); }
});
</script>

</body>
</html>
