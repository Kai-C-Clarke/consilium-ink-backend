<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Composer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--parchment:#f5edd8;--gold:#b8860b;--gold-light:#d4a843;--rust:#8b3a1a;--dim:#7a6a50;--teal:#2a7a6a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--parchment);font-family:'Cormorant Garamond',Georgia,serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,#2a1a08 0%,var(--ink) 60%);z-index:-1}
  header{text-align:center;margin-bottom:40px}
  .eyebrow{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.5em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
  h1{font-family:'Cinzel',serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:600;color:var(--parchment);letter-spacing:.08em;line-height:1}
  h1 em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold-light);font-weight:300;font-size:1.15em}
  .rule{display:flex;align-items:center;gap:14px;margin:20px auto;max-width:320px}
  .rule-line{flex:1;height:1px;background:var(--gold);opacity:.3}
  .rule-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);opacity:.7}
  .subtitle{font-style:italic;color:var(--dim);font-size:1.05rem}
  .section-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.4em;color:var(--gold);
    text-transform:uppercase;opacity:.7;margin-bottom:12px;text-align:center}
  .key-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
  .key-btn,.mode-btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;
    padding:7px 13px;border:1px solid rgba(184,134,11,.3);background:transparent;
    color:var(--dim);cursor:pointer;transition:all .2s ease;text-transform:uppercase}
  .key-btn:hover,.mode-btn:hover{border-color:var(--gold);color:var(--gold-light)}
  .key-btn.active{border-color:var(--gold);background:rgba(184,134,11,.15);color:var(--gold-light)}
  .mode-btn.active{border-color:var(--gold);background:var(--gold);color:var(--ink)}
  .composer-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:760px;margin-bottom:10px}
  .composer-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;padding:10px 20px;
    border:1px solid rgba(184,134,11,.3);background:transparent;color:var(--dim);cursor:pointer;
    transition:all .25s ease;text-transform:uppercase;position:relative}
  .composer-btn:hover{border-color:var(--gold);color:var(--gold-light);background:rgba(184,134,11,.06)}
  .composer-btn.active{border-color:var(--gold);color:var(--ink);background:var(--gold)}
  .tick{position:absolute;top:-6px;right:-6px;width:14px;height:14px;background:var(--rust);
    border-radius:50%;font-size:.55rem;line-height:14px;text-align:center;color:white;display:none}
  .composer-btn.active .tick{display:block}
  .blend-hint{font-style:italic;color:var(--dim);font-size:.85rem;text-align:center;margin-bottom:24px;min-height:1.2em}
  .controls-row{display:flex;gap:18px;align-items:flex-end;justify-content:center;flex-wrap:wrap;margin-bottom:36px}
  .slider-group{display:flex;flex-direction:column;align-items:center;gap:6px}
  .slider-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
  input[type=range]{-webkit-appearance:none;width:100px;height:2px;background:rgba(184,134,11,.25);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer}
  .slider-val{font-family:'Cinzel',serif;font-size:.62rem;color:var(--gold-light);letter-spacing:.1em}
  .compose-btn{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;padding:14px 38px;
    border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;
    transition:all .3s ease;text-transform:uppercase;align-self:flex-end}
  .compose-btn:hover:not(:disabled){background:var(--gold);color:var(--ink)}
  .compose-btn:disabled{opacity:.4;cursor:default}
  .status-line{font-style:italic;color:var(--dim);font-size:.95rem;min-height:1.4em;margin:16px 0 24px;text-align:center}
  .result-panel{width:100%;max-width:820px;background:rgba(255,255,255,.02);
    border:1px solid rgba(184,134,11,.2);padding:26px 28px 22px;margin-bottom:24px;display:none}
  .result-panel.visible{display:block}
  .piece-title{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
  .piece-subtitle{font-size:.85rem;color:var(--dim);font-style:italic;margin-bottom:18px}
  .voice-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .voice-lane{background:rgba(184,134,11,.04);border:1px solid rgba(184,134,11,.12);padding:8px 10px}
  .voice-lane-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;opacity:.7}
  /* Colour-code voice lanes */
  .voice-lane.bass-lane  {border-color:rgba(139,58,26,.35)}
  .voice-lane.harm-lane  {border-color:rgba(42,122,106,.35)}
  .voice-lane.mel-lane   {border-color:rgba(184,134,11,.35)}
  .voice-notes{display:flex;flex-wrap:wrap;gap:3px;min-height:24px}
  .note-pill{font-family:'Courier New',monospace;font-size:.6rem;padding:2px 5px;
    background:rgba(184,134,11,.08);border:1px solid rgba(184,134,11,.18);
    color:var(--gold-light);border-radius:1px;transition:background .04s,color .04s,border-color .04s}
  /* Melody: gold */
  .note-pill.mel-lit  {background:var(--gold);color:var(--ink);border-color:var(--gold-light)}
  /* Harmony: teal */
  .note-pill.harm-lit {background:#2a7a6a;color:#c8f0e8;border-color:#3aaa90}
  /* Bass: rust */
  .note-pill.bass-lit {background:var(--rust);color:var(--parchment);border-color:#c0522a}
  .play-row{display:flex;gap:12px;flex-wrap:wrap}
  .ctrl-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.15em;padding:9px 22px;
    border:1px solid rgba(139,58,26,.5);background:transparent;color:var(--rust);cursor:pointer;
    transition:all .2s ease;text-transform:uppercase}
  .ctrl-btn:hover:not(:disabled){background:rgba(139,58,26,.12);border-color:var(--rust)}
  .ctrl-btn.playing{background:var(--rust);color:var(--parchment);border-color:var(--rust)}
  .ctrl-btn:disabled{opacity:.3;cursor:default}
  .programme-note{width:100%;max-width:820px;border-left:2px solid rgba(184,134,11,.3);
    padding:14px 20px;font-style:italic;color:var(--dim);font-size:.95rem;line-height:1.75;display:none;margin-bottom:24px}
  .programme-note.visible{display:block}
  .tech-note{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;color:var(--dim);
    opacity:.4;text-transform:uppercase;text-align:center;margin-top:40px}
</style>
</head>
<body>
<header>
  <p class="eyebrow">The Cast · Presents</p>
  <h1>The <em>Composer</em></h1>
  <div class="rule"><div class="rule-line"></div><div class="rule-diamond"></div><div class="rule-line"></div></div>
  <p class="subtitle">Generative music · composer-inspired</p>
</header>

<p class="section-label">Key</p>
<div class="key-row" id="keyRow"></div>
<p class="section-label" style="margin-top:4px">Mode</p>
<div class="key-row" id="modeRow"></div>
<p class="section-label" style="margin-top:20px">Influences · select one or more</p>
<div class="composer-grid" id="composerGrid"></div>
<p class="blend-hint" id="blendHint">Select a composer to begin</p>

<div class="controls-row">
  <div class="slider-group">
    <span class="slider-label">Tempo</span>
    <input type="range" id="tempoSlider" min="36" max="180" value="80">
    <span class="slider-val" id="tempoVal">80 bpm</span>
  </div>
  <div class="slider-group">
    <span class="slider-label">Warmth</span>
    <input type="range" id="detuneSlider" min="0" max="100" value="35">
    <span class="slider-val" id="detuneVal">35%</span>
  </div>
  <div class="slider-group">
    <span class="slider-label">Voices</span>
    <input type="range" id="voicesSlider" min="1" max="5" value="3">
    <span class="slider-val" id="voicesVal">3</span>
  </div>
  <div class="slider-group">
    <span class="slider-label">Bass</span>
    <input type="range" id="bassSlider" min="0" max="100" value="60">
    <span class="slider-val" id="bassVal">60%</span>
  </div>
  <button class="compose-btn" id="composeBtn" disabled>Compose</button>
</div>

<p class="status-line" id="statusLine"></p>

<div class="result-panel" id="resultPanel">
  <p class="piece-title" id="pieceTitle"></p>
  <p class="piece-subtitle" id="pieceSubtitle"></p>
  <div class="voice-grid">
    <div class="voice-lane bass-lane"><p class="voice-lane-label">Bass</p><div class="voice-notes" id="bassNotes"></div></div>
    <div class="voice-lane harm-lane"><p class="voice-lane-label">Harmony</p><div class="voice-notes" id="harmNotes"></div></div>
    <div class="voice-lane mel-lane"> <p class="voice-lane-label">Melody</p><div class="voice-notes" id="melNotes"></div></div>
  </div>
  <div class="play-row">
    <button class="ctrl-btn" id="playBtn" disabled>▶ Play</button>
    <button class="ctrl-btn" id="stopBtn" disabled>■ Stop</button>
  </div>
</div>

<div class="programme-note" id="programmeNote"></div>
<p class="tech-note">Kai consciousness engine · sine bass · rhythmic harmony · flute melody</p>

<!-- Tone.js for sample-based playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const noteName   = midi => NOTE_NAMES[((midi%12)+12)%12] + (Math.floor(midi/12)-1);
// Tone.js note name (uses sharps only, no flats in sample URLs)
const SHARP_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const toneNote   = midi => SHARP_NAMES[((midi%12)+12)%12] + (Math.floor(midi/12)-1);

// ── KEY / MODE ─────────────────────────────────────────────────────────────
let selectedKey=0, selectedMode='minor';

const CHORD_DEFS = {
  'I':[0,4,7],'ii':[2,5,9],'II':[2,6,9],'iii':[4,7,11],'IV':[5,9,12],
  'V':[7,11,14],'vi':[9,12,16],
  'i':[0,3,7],'III':[3,7,10],'iv':[5,8,12],'Vm':[7,11,14],
  'VI':[8,12,15],'VII':[10,14,17]
};
function realizeChord(degree, rootMidi) {
  const def = CHORD_DEFS[degree]||CHORD_DEFS['I'];
  return def.map(off => { let m=rootMidi+off; while(m>72)m-=12; while(m<40)m+=12; return m; });
}
const COMPOSER_PATTERNS = {
  bach:        {prog:['i','iv','Vm','i','III','iv','Vm','i'], cadence:['Vm','i'],  defaultMode:'minor'},
  mozart:      {prog:['I','V','IV','I','ii','V','IV','I'],    cadence:['V','I'],   defaultMode:'major'},
  beethoven:   {prog:['i','i','VI','VII','i','Vm','VI','i'],  cadence:['Vm','i'],  defaultMode:'minor'},
  tchaikovsky: {prog:['I','iii','IV','V','I','vi','IV','I'],  cadence:['V','I'],   defaultMode:'major'},
  debussy:     {prog:['I','II','IV','I','VII','I','IV','I'],  cadence:['IV','I'],  defaultMode:'major'},
  chopin:      {prog:['i','iv','VII','i','VI','iv','Vm','i'], cadence:['Vm','i'],  defaultMode:'minor'},
  vivaldi:     {prog:['i','i','VI','Vm','i','VII','VI','Vm'], cadence:['Vm','i'],  defaultMode:'minor'},
};
function buildChords(patternId) {
  const root=48+selectedKey;
  return COMPOSER_PATTERNS[patternId].prog.map(d=>realizeChord(d,root));
}
function buildCadenceChords(patternId) {
  const root=48+selectedKey;
  return COMPOSER_PATTERNS[patternId].cadence.map(d=>realizeChord(d,root));
}

// ── KAI MELODY ENGINE ──────────────────────────────────────────────────────
function chordTones(ch)   { return [...new Set(ch.map(n=>n%12))]; }
function inChord(midi,ch) { return chordTones(ch).includes(midi%12); }
function clamp(x,a,b)     { return Math.max(a,Math.min(b,x)); }
function nearestChordTone(target,chord) {
  let best=target,bestD=999;
  for(let d=-12;d<=12;d++){const m=target+d;if(inChord(m,chord)&&Math.abs(d)<bestD){best=m;bestD=Math.abs(d);}}
  return best;
}
function stepToward(from,to,chord,preferChordOnStrong) {
  const dir=Math.sign(to-from)||(Math.random()<.5?1:-1);
  const options=[from+dir*1,from+dir*2,from];
  const weights=options.map(m=>{
    let w=(m===from)?0.25:(Math.abs(m-from)===1?1.0:0.65);
    if(preferChordOnStrong) w*=inChord(m,chord)?1.6:0.7;
    if(m<60||m>81) w*=0.3;
    return w;
  });
  const sum=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*sum;
  for(let i=0;i<options.length;i++){r-=weights[i];if(r<=0)return options[i];}
  return options[0];
}
function generateMelody(allChords,stepsPerBar) {
  let cur=nearestChordTone(69,allChords[0]);
  const anchors=allChords.map((ch,bar)=>{
    const phraseArc=Math.sin((bar/Math.max(1,allChords.length-1))*Math.PI);
    const drift=Math.round(phraseArc*4);
    const t=nearestChordTone(cur+drift+(bar%4===3?-2:2),ch);
    return clamp(t,62,79);
  });
  const lastCh=allChords[allChords.length-1];
  const final=nearestChordTone(72,lastCh);
  anchors[anchors.length-1]=final;
  anchors[anchors.length-2]=final+(Math.random()<.5?2:-1);
  const melody=[];
  for(let bar=0;bar<allChords.length;bar++){
    const chord=allChords[bar];
    for(let s=0;s<stepsPerBar;s++){
      const strong=(s===0||s===Math.floor(stepsPerBar/2));
      cur=stepToward(cur,anchors[bar],chord,strong);
      if(strong) cur=nearestChordTone(cur,chord);
      melody.push(cur);
    }
    cur=nearestChordTone(cur,chord);
  }
  return melody;
}

// Groove helpers (Kai)
function applySwing(time,swingAmt,stepIndex){
  return time+((stepIndex%2===1)?swingAmt:0);
}
function jitter(maxMs){ return (Math.random()*2-1)*(maxMs/1000); }
const LANE_OFFSET = { bass:-0.010, harmony:0.000, melody:0.015 };
function liftHarmony(chord){
  return chord.map(m=>{ let x=m; while(x<55)x+=12; while(x>79)x-=12; return x; });
}
const ARP_PATTERNS=[
  [0,2,1,3,2,1,2,0],[0,1,2,3,2,1],[0,2,3,1,2],[0,1,0,2,0,3],[0,2,4,2,1,3]
];
function pickArpIndex(step,chordLen,pattern){
  const pat=pattern&&pattern.length?pattern:ARP_PATTERNS[0];
  return pat[step%pat.length]%Math.max(1,chordLen);
}

// ── COMPOSER PROFILES ──────────────────────────────────────────────────────
const PROFILES = {
  bach:        {name:'Bach',        fullName:'J.S. Bach',                tempo:84, barBeats:4,melNotesPerBar:8, dotted:false,compHits:2,reverb:.15,release:.8},
  mozart:      {name:'Mozart',      fullName:'W.A. Mozart',              tempo:116,barBeats:3,melNotesPerBar:6, dotted:false,compHits:3,reverb:.12,release:.6},
  beethoven:   {name:'Beethoven',   fullName:'Ludwig van Beethoven',     tempo:72, barBeats:4,melNotesPerBar:8, dotted:true, compHits:2,reverb:.20,release:1.2},
  tchaikovsky: {name:'Tchaikovsky', fullName:'Pyotr Ilyich Tchaikovsky', tempo:60, barBeats:3,melNotesPerBar:6, dotted:false,compHits:3,reverb:.28,release:1.0},
  debussy:     {name:'Debussy',     fullName:'Claude Debussy',           tempo:52, barBeats:4,melNotesPerBar:8, dotted:false,compHits:2,reverb:.40,release:1.5},
  chopin:      {name:'Chopin',      fullName:'Frédéric Chopin',          tempo:52, barBeats:4,melNotesPerBar:8, dotted:false,compHits:2,reverb:.25,release:1.8},
  vivaldi:     {name:'Vivaldi',     fullName:'Antonio Vivaldi',          tempo:144,barBeats:4,melNotesPerBar:16,dotted:false,compHits:4,reverb:.10,release:.5},
};
function blendProfiles(ids) {
  if(ids.length===1) return {...PROFILES[ids[0]],patternId:ids[0]};
  const pp=ids.map(id=>PROFILES[id]); const w=1/pp.length;
  return {
    name:pp.map(p=>p.name).join(' · '),fullName:pp.map(p=>p.fullName).join(' & '),patternId:ids[0],
    tempo:  Math.round(pp.reduce((s,p)=>s+p.tempo,0)*w),
    barBeats:Math.round(pp.reduce((s,p)=>s+p.barBeats,0)*w),
    melNotesPerBar:Math.round(pp.reduce((s,p)=>s+p.melNotesPerBar,0)*w),
    dotted: pp.some(p=>p.dotted),
    compHits:Math.round(pp.reduce((s,p)=>s+p.compHits,0)*w),
    reverb: pp.reduce((s,p)=>s+p.reverb,0)*w,
    release:pp.reduce((s,p)=>s+p.release,0)*w,
  };
}

// ── TONE.JS INSTRUMENTS ────────────────────────────────────────────────────
// Salamander Grand Piano (public CDN) for all three voices.
// Different octave ranges + volume/reverb treatment give them distinct characters.

const SALAMANDER = 'https://tonejs.github.io/audio/salamander/';
const PIANO_NOTES = {
  'A0':'A0','C1':'C1','D#1':'Ds1','F#1':'Fs1',
  'A1':'A1','C2':'C2','D#2':'Ds2','F#2':'Fs2',
  'A2':'A2','C3':'C3','D#3':'Ds3','F#3':'Fs3',
  'A3':'A3','C4':'C4','D#4':'Ds4','F#4':'Fs4',
  'A4':'A4','C5':'C5','D#5':'Ds5','F#5':'Fs5',
  'A5':'A5','C6':'C6','D#6':'Ds6','F#6':'Fs6',
  'A6':'A6','C7':'C7',
};

// Build sample map pointing to CDN
function salamanderMap() {
  const map = {};
  for (const [note, file] of Object.entries(PIANO_NOTES)) {
    map[note] = SALAMANDER + file + '.mp3';
  }
  return map;
}

// Reverb shared across instruments
let reverbNode = null;

// Three samplers — created fresh each compose so release/reverb reflect profile
let bassSampler=null, harmSampler=null, melSampler=null;
let samplersReady = false;

async function buildSamplers(profile) {
  // Dispose old
  [bassSampler, harmSampler, melSampler].forEach(s=>{ if(s) s.dispose(); });
  if(reverbNode) reverbNode.dispose();
  samplersReady = false;

  reverbNode = new Tone.Reverb({ decay: 1.5 + profile.reverb * 6, wet: profile.reverb }).toDestination();
  await reverbNode.generate();

  const map = salamanderMap();

  // Bass: longer release, routed through reverb, lower volume
  bassSampler = new Tone.Sampler({
    urls: map,
    release: profile.release * 1.2,
    volume: -8,
    onload: checkReady,
  }).connect(reverbNode);

  // Harmony: medium release, slightly wet
  harmSampler = new Tone.Sampler({
    urls: map,
    release: profile.release,
    volume: -12,
    onload: checkReady,
  }).connect(reverbNode);

  // Melody: shorter release, direct + wet mix, slightly louder
  melSampler = new Tone.Sampler({
    urls: map,
    release: profile.release * 0.7,
    volume: -6,
    onload: checkReady,
  }).toDestination();  // melody also goes direct for clarity
  melSampler.connect(reverbNode);

  let loaded = 0;
  function checkReady() {
    loaded++;
    if (loaded >= 3) samplersReady = true;
  }
}

// ── COMPOSITION SCHEDULER ──────────────────────────────────────────────────
function buildSchedule(profile, tempo) {
  const {patternId} = profile;
  const beatDur = 60/tempo, barDur = beatDur*profile.barBeats;
  const swingAmt = 0.012;

  let chordSeq = buildChords(patternId);
  const cad = buildCadenceChords(patternId);
  chordSeq[chordSeq.length-2] = cad[0];
  chordSeq[chordSeq.length-1] = cad[1];

  const melodyMidi = generateMelody(chordSeq, profile.melNotesPerBar);
  const melNDur    = barDur / profile.melNotesPerBar;
  const harmStepsPerBar = profile.melNotesPerBar;  // always in sync with melody grid
  const harmStepDur = barDur / harmStepsPerBar;
  const totalDur = barDur * chordSeq.length + 2.0;

  const bassEvents=[], harmEvents=[], melEvents=[];
  const bassLog=[], harmLog=new Set(), melLog=[];
  const bassSchedule=[], harmSchedule=[], melSchedule=[];

  for(let bar=0; bar<chordSeq.length; bar++){
    const rawChord = chordSeq[bar];
    const chord    = liftHarmony(rawChord);
    const arpPat   = ARP_PATTERNS[Math.floor(Math.random()*ARP_PATTERNS.length)];
    const barStart = bar * barDur;

    // BASS — the clock. Placed exactly on the beat, zero jitter.
    const root  = Math.max(rawChord[0]-12, 36);
    const fifth = root + 7;
    const bassMode = Math.floor(Math.random()*4);
    const bassHits = [[root, 0]];
    if(bassMode===1 && profile.barBeats>=3) bassHits.push([fifth, Math.floor(profile.barBeats/2)]);
    if(bassMode===2) bassHits.push([root, Math.floor(profile.barBeats/2)]);
    if(bassMode===3) bassHits.push([clamp(root+2,36,52), Math.max(1,profile.barBeats-1)]);

    for(const [midi, beat] of bassHits){
      const t   = barStart + beat * beatDur;   // exact — bass is the grid
      const dur = beatDur * 0.85;
      bassEvents.push({time:t, midi, dur});
      bassSchedule.push({time:t, duration:dur, midi});
      bassLog.push(midi);
    }

    // HARMONY — locked to bar grid, tiny humanise nudge only (max 2ms, can't cross a subdivision)
    for(let hs=0; hs<harmStepsPerBar; hs++){
      const idx  = pickArpIndex(hs, chord.length, arpPat);
      const midi = chord[idx];
      harmLog.add(midi);
      const gridT = barStart + hs * harmStepDur;   // exact subdivision position
      const t     = gridT + jitter(2);              // ±2ms human feel, never enough to cross grid
      const dur   = harmStepDur * 0.78;
      harmEvents.push({time:t, midi, dur});
      harmSchedule.push({time:t, duration:dur, midi});
    }

    // MELODY — each note placed at exact grid position within bar, tiny nudge only
    const barMelStart = bar * profile.melNotesPerBar;
    for(let mi=0; mi<profile.melNotesPerBar; mi++){
      const midiNote = melodyMidi[barMelStart + mi];
      if(midiNote===undefined) break;
      // Occasional rest — skip slot but keep grid position
      if(Math.random() < 0.10 && mi !== 0) continue;
      const gridT = barStart + mi * melNDur;        // exact position in bar
      let dur = melNDur * 0.92;                     // slight gap between notes
      if(profile.dotted) dur = (mi%2===0) ? melNDur*1.35 : melNDur*0.55;
      dur = Math.max(0.08, dur);
      const t = gridT + jitter(2);                  // ±2ms only
      melEvents.push({time:t, midi:midiNote, dur});
      melSchedule.push({time:t, duration:dur, midi:midiNote});
      melLog.push(midiNote);
    }
  }

  return {
    bassEvents, harmEvents, melEvents,
    bassLog, harmLog:[...harmLog], melLog,
    bassSchedule, harmSchedule, melSchedule,
    totalDur
  };
}

// ── PLAYBACK ───────────────────────────────────────────────────────────────
let scheduledParts = [];
let isPlaying = false;

function stopPlayback() {
  Tone.Transport.stop();
  Tone.Transport.cancel();
  scheduledParts.forEach(p => { try { p.dispose(); } catch(e){} });
  scheduledParts = [];
  isPlaying = false;
  stopAnimation();
}

function scheduleParts(bassEvents, harmEvents, melEvents) {
  stopPlayback();

  // Bass
  const bassPart = new Tone.Part((time, ev) => {
    if(bassSampler && samplersReady) {
      bassSampler.triggerAttackRelease(toneNote(ev.midi), ev.dur, time, 0.75);
    }
  }, bassEvents.map(e => [e.time, e]));
  bassPart.start(0);
  scheduledParts.push(bassPart);

  // Harmony
  const harmPart = new Tone.Part((time, ev) => {
    if(harmSampler && samplersReady) {
      harmSampler.triggerAttackRelease(toneNote(ev.midi), ev.dur, time, 0.5);
    }
  }, harmEvents.map(e => [e.time, e]));
  harmPart.start(0);
  scheduledParts.push(harmPart);

  // Melody
  const melPart = new Tone.Part((time, ev) => {
    if(melSampler && samplersReady) {
      melSampler.triggerAttackRelease(toneNote(ev.midi), ev.dur, time, 0.85);
    }
  }, melEvents.map(e => [e.time, e]));
  melPart.start(0);
  scheduledParts.push(melPart);
}

// ── ANIMATION ──────────────────────────────────────────────────────────────
let animRaf=null, animStartTime=null;
let currentMelSched=[], currentHarmSched=[], currentBassSched=[];
let melPills=[], harmPills=[], bassPills=[];
let melIdx=0, harmIdx=0, bassIdx=0;

function startAnimation(totalDur) {
  melIdx=0; harmIdx=0; bassIdx=0;
  animStartTime = Tone.now();
  cancelAnimationFrame(animRaf);

  function frame() {
    const elapsed = Tone.now() - animStartTime;
    if(elapsed > totalDur + 0.5) { stopAnimation(); return; }

    while(melIdx < currentMelSched.length && elapsed >= currentMelSched[melIdx].time){
      const ev = currentMelSched[melIdx];
      const pill = melPills[melIdx % Math.max(melPills.length,1)];
      if(pill){ pill.classList.add('mel-lit'); setTimeout(()=>pill.classList.remove('mel-lit'), ev.duration*850); }
      melIdx++;
    }
    while(harmIdx < currentHarmSched.length && elapsed >= currentHarmSched[harmIdx].time){
      const ev = currentHarmSched[harmIdx];
      const pill = harmPills[harmIdx % Math.max(harmPills.length,1)];
      if(pill){ pill.classList.add('harm-lit'); setTimeout(()=>pill.classList.remove('harm-lit'), ev.duration*600); }
      harmIdx++;
    }
    while(bassIdx < currentBassSched.length && elapsed >= currentBassSched[bassIdx].time){
      const pill = bassPills[bassIdx % Math.max(bassPills.length,1)];
      if(pill){ pill.classList.add('bass-lit'); setTimeout(()=>pill.classList.remove('bass-lit'), 200); }
      bassIdx++;
    }
    animRaf = requestAnimationFrame(frame);
  }
  animRaf = requestAnimationFrame(frame);
}

function stopAnimation() {
  cancelAnimationFrame(animRaf); animRaf=null; animStartTime=null;
  melPills.forEach(p=>p.classList.remove('mel-lit'));
  harmPills.forEach(p=>p.classList.remove('harm-lit'));
  bassPills.forEach(p=>p.classList.remove('bass-lit'));
}

// ── UI HELPERS ─────────────────────────────────────────────────────────────
const NOTE_NAMES_UI=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const keyRow=document.getElementById('keyRow');
NOTE_NAMES_UI.forEach((name,i)=>{
  const btn=document.createElement('button');
  btn.className='key-btn'+(i===0?' active':'');
  btn.textContent=name;
  btn.onclick=()=>{ selectedKey=i; document.querySelectorAll('.key-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
  keyRow.appendChild(btn);
});

const modeRow=document.getElementById('modeRow');
['Minor','Major'].forEach(mode=>{
  const btn=document.createElement('button');
  btn.className='mode-btn'+(mode.toLowerCase()===selectedMode?' active':'');
  btn.textContent=mode;
  btn.onclick=()=>{ selectedMode=mode.toLowerCase(); document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
  modeRow.appendChild(btn);
});

let selectedIds=new Set();
const grid=document.getElementById('composerGrid');
Object.entries(PROFILES).forEach(([id,p])=>{
  const btn=document.createElement('button');
  btn.className='composer-btn';
  btn.innerHTML=`${p.name}<span class="tick">✓</span>`;
  btn.onclick=()=>{
    selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
    btn.classList.toggle('active');
    if(selectedIds.size===1){
      const dm=COMPOSER_PATTERNS[id].defaultMode;
      selectedMode=dm;
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===dm));
    }
    updateHint();
  };
  grid.appendChild(btn);
});

function updateHint(){
  const ids=[...selectedIds];
  const hint=document.getElementById('blendHint');
  const btn=document.getElementById('composeBtn');
  if(!ids.length){hint.textContent='Select a composer to begin';btn.disabled=true;return;}
  hint.textContent=ids.length===1
    ?`${PROFILES[ids[0]].fullName} · Salamander Grand Piano`
    :`Blending: ${ids.map(id=>PROFILES[id].name).join(' + ')}`;
  btn.disabled=false;
}

['tempo','detune','voices','bass'].forEach(id=>{
  const sl=document.getElementById(id+'Slider');
  const vl=document.getElementById(id+'Val');
  if(sl) sl.oninput=()=>{ vl.textContent=id==='voices'?sl.value:id==='tempo'?`${sl.value} bpm`:`${sl.value}%`; };
});

// ── COMPOSE BUTTON ─────────────────────────────────────────────────────────
let currentSchedule = null;

document.getElementById('composeBtn').addEventListener('click', async ()=>{
  const ids=[...selectedIds]; if(!ids.length) return;
  stopPlayback();

  const compBtn=document.getElementById('composeBtn');
  compBtn.disabled=true;
  hide('resultPanel'); hide('programmeNote');
  document.getElementById('playBtn').disabled=true;
  document.getElementById('stopBtn').disabled=true;

  const profile  = blendProfiles(ids);
  const tempo    = parseInt(document.getElementById('tempoSlider').value);
  const keyLabel = NOTE_NAMES[selectedKey];

  setStatus('Loading Salamander piano samples…');
  await Tone.start(); // unlock AudioContext on user gesture
  await buildSamplers(profile);

  setStatus(`Composing in ${keyLabel} ${selectedMode}…`);
  await tick();

  currentSchedule = buildSchedule(profile, tempo);
  const {bassEvents,harmEvents,melEvents,bassLog,harmLog,melLog,bassSchedule,harmSchedule,melSchedule,totalDur} = currentSchedule;

  currentBassSched = bassSchedule;
  currentHarmSched = harmSchedule;
  currentMelSched  = melSchedule;

  melPills  = fillVoice('melNotes',  melLog.slice(0,32));
  harmPills = fillVoice('harmNotes', [...new Set(harmLog)].slice(0,16));
  bassPills = fillVoice('bassNotes', [...new Set(bassLog)].slice(0,8));

  document.getElementById('pieceTitle').textContent=`A new work · ${profile.name}`;
  document.getElementById('pieceSubtitle').textContent=
    `${keyLabel} ${selectedMode} · Salamander Grand Piano · ${profile.barBeats}/4 · ${profile.melNotesPerBar} notes/bar`;

  // Pre-schedule all Tone.js parts ready to play
  scheduleParts(bassEvents, harmEvents, melEvents);

  show('resultPanel');
  document.getElementById('playBtn').disabled=false;
  document.getElementById('stopBtn').disabled=false;
  setStatus('Ready · press Play');
  compBtn.disabled=false;

  getProgrammeNote(profile.fullName, keyLabel, selectedMode).then(note=>{
    if(note){ document.getElementById('programmeNote').textContent=`"${note}"`; show('programmeNote'); }
  });
});

document.getElementById('playBtn').addEventListener('click', async ()=>{
  if(!currentSchedule) return;
  await Tone.start();
  // Wait for samples if still loading
  if(!samplersReady){
    setStatus('Waiting for samples…');
    await new Promise(r=>{ const iv=setInterval(()=>{ if(samplersReady){clearInterval(iv);r();} },100); });
  }
  Tone.Transport.stop();
  Tone.Transport.position = 0;
  const btn=document.getElementById('playBtn');
  btn.classList.add('playing'); btn.textContent='▶ Playing…'; btn.disabled=true;
  isPlaying=true;
  Tone.Transport.start();
  startAnimation(currentSchedule.totalDur);
  // Re-enable play button after piece ends
  setTimeout(()=>{
    btn.classList.remove('playing'); btn.textContent='▶ Play'; btn.disabled=false; isPlaying=false;
  }, currentSchedule.totalDur * 1000 + 1500);
  setStatus('');
});

document.getElementById('stopBtn').addEventListener('click', ()=>{
  stopPlayback();
  const btn=document.getElementById('playBtn');
  btn.classList.remove('playing'); btn.textContent='▶ Play'; btn.disabled=!currentSchedule;
  setStatus('');
});

function fillVoice(elId, midis){
  const el=document.getElementById(elId); el.innerHTML=''; const pills=[];
  midis.forEach(m=>{
    const s=document.createElement('span');
    s.className='note-pill'; s.textContent=noteName(m);
    el.appendChild(s); pills.push(s);
  });
  return pills;
}

async function getProgrammeNote(name,key,mode){
  try{
    const res=await fetch('/api/programme-note',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,key,mode})
    });
    const d=await res.json(); return d.note||'';
  }catch(e){return '';}
}

const tick=()=>new Promise(r=>setTimeout(r,20));
const setStatus=t=>document.getElementById('statusLine').textContent=t;
const show=id=>document.getElementById(id).classList.add('visible');
const hide=id=>document.getElementById(id).classList.remove('visible');
</script>
</body>
